# Docker Compose configuration for copilot-api
# 
# Quick start:
#   docker compose up -d
#
# Then visit http://localhost:4141/admin to add your GitHub account

services:
  copilot-api:
    image: ${IMAGE:-ghcr.io/yuegongzi/copilot-api:latest}
    container_name: ${CONTAINER_NAME:-copilot-api}
    ports:
      # Publish to localhost only so admin and token stay off the LAN.
      - "127.0.0.1:${HOST_PORT:-4141}:${PORT:-4141}"
    volumes:
      # Persist account configuration
      - copilot-data:/data
    environment:
      - PORT=${PORT:-4141}
      - HOST=0.0.0.0
      - LOCAL_ACCESS_MODE=container-bridge
      - LOCAL_ACCESS_PASSWORD=${LOCAL_ACCESS_PASSWORD:?Set LOCAL_ACCESS_PASSWORD in your shell or .env before running docker compose up}
      # Optional: API key for LAN API access
      # - API_KEY=${API_KEY:-}
      # Optional: Enable verbose logging
      # - VERBOSE=true
      # Optional: Rate limit (seconds between requests)
      # - RATE_LIMIT=5
      # - RATE_LIMIT_WAIT=true
      # Optional: Use HTTP_PROXY/HTTPS_PROXY env vars as fallback proxy
      # - PROXY_ENV=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:${PORT:-4141}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  copilot-data:
